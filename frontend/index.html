<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASAF — Smart Antenatal Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
  :root{
    --bg:#FBF6EC;
    --surface:#FFFFFF;
    --ink:#2B2A28;
    --ink-soft:#6E6A5F;
    --line:#E6DDC8;
    --primary:#1F4D3E;
    --primary-soft:#E4EEE9;
    --accent:#E2A33B;
    --accent-soft:#FBEDD3;
    --rose:#BE5347;
    --rose-soft:#F7E3DF;
    --sage:#5E8F6E;
    --sage-soft:#E4EFE6;
    --amber:#C98A2A;
    --amber-soft:#FBEDD3;
    --radius:14px;
    --shadow: 0 6px 24px rgba(43,42,40,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Source Sans 3', system-ui, sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{ font-family:'Fraunces', Georgia, serif; margin:0; letter-spacing:-0.01em; }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  a{ color:var(--primary); text-decoration:none; }
  a:hover{ text-decoration:underline; }

  /* ---------- Top nav ---------- */
  .navbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 28px; background:var(--surface); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:50;
  }
  .nav-brand{ display:flex; align-items:center; gap:10px; cursor:pointer; }
  .brand-mark{
    width:32px; height:32px; border-radius:8px; background:var(--primary);
    display:flex; align-items:center; justify-content:center; color:var(--accent-soft);
    font-family:'Fraunces',serif; font-weight:700; font-size:16px;
  }
  .nav-brand h2{ font-size:18px; color:var(--ink); }
  .nav-links{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .nav-link{
    font-size:13px; font-weight:600; color:var(--ink-soft); padding:8px 12px;
    border-radius:8px; cursor:pointer; text-decoration:none; white-space:nowrap;
  }
  .nav-link:hover{ background:var(--primary-soft); color:var(--primary); }
  .nav-link.active{ background:var(--primary-soft); color:var(--primary); }
  .nav-link.cta{ background:var(--primary); color:#fff; }
  .nav-link.cta:hover{ filter:brightness(0.95); color:#fff; }

  /* ---------- Page layout ---------- */
  .page{ max-width:1100px; margin:0 auto; padding:36px 24px 64px; }
  .page-narrow{ max-width:520px; margin:0 auto; padding:48px 24px 64px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--accent); font-weight:500;
  }
  .hero h1{ font-size:40px; color:var(--primary); margin-top:6px; line-height:1.15; }
  .hero p.lede{ font-size:16px; color:var(--ink-soft); max-width:60ch; line-height:1.65; margin-top:14px; }
  .hero-actions{ display:flex; gap:12px; margin-top:24px; flex-wrap:wrap; }

  .grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:32px; }
  @media (max-width: 800px){ .grid-3{ grid-template-columns:1fr; } }

  .module-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px 22px; box-shadow:var(--shadow);
  }
  .module-card h3{ font-size:16px; color:var(--primary); margin-bottom:6px; }
  .module-card .tag{
    display:inline-block; font-family:'IBM Plex Mono', monospace; font-size:11px;
    background:var(--primary-soft); color:var(--primary); border-radius:6px;
    padding:3px 8px; margin-bottom:10px; letter-spacing:0.04em;
  }
  .module-card p{ font-size:13.5px; line-height:1.6; color:var(--ink-soft); margin:0; }

  /* ---------- Forms ---------- */
  .auth-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:32px; box-shadow:var(--shadow);
  }
  .auth-card h2{ font-size:22px; color:var(--primary); margin-bottom:6px; }
  .auth-card .sub{ font-size:13px; color:var(--ink-soft); margin-bottom:20px; }
  label{ font-size:12px; color:var(--ink-soft); display:block; margin-bottom:4px; font-weight:600; }
  input, select, textarea{
    width:100%; padding:10px 11px; border:1px solid var(--line); border-radius:8px;
    font-size:14px; font-family:inherit; background:#fff; color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{ outline:2px solid var(--primary); outline-offset:1px; }
  .field{ margin-bottom:14px; }
  .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .role-toggle{ display:flex; gap:8px; margin-bottom:14px; }
  .role-toggle button{
    flex:1; padding:10px; border:1px solid var(--line); border-radius:8px; background:#fff;
    font-family:inherit; font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer;
  }
  .role-toggle button.active{ border-color:var(--primary); background:var(--primary-soft); color:var(--primary); }

  .btn{
    border:none; border-radius:8px; padding:11px 18px; font-size:14px; font-weight:600;
    cursor:pointer; font-family:inherit; transition:filter 0.15s ease;
  }
  .btn:hover{ filter:brightness(0.95); }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-secondary{ background:var(--primary-soft); color:var(--primary); }
  .btn-accent{ background:var(--accent); color:#3a2a06; }
  .btn-danger{ background:var(--rose-soft); color:var(--rose); }
  .btn:disabled{ opacity:0.45; cursor:not-allowed; }
  .btn-block{ width:100%; }
  .btn-sm{ padding:6px 12px; font-size:12px; }

  .error-box{
    background:var(--rose-soft); color:var(--rose); border-radius:8px; padding:10px 12px;
    font-size:13px; margin-bottom:14px;
  }
  .success-box{
    background:var(--sage-soft); color:var(--sage); border-radius:8px; padding:10px 12px;
    font-size:13px; margin-bottom:14px;
  }

  /* ---------- Tables (admin) ---------- */
  .data-table{ width:100%; border-collapse:collapse; font-size:13px; }
  .data-table th{
    text-align:left; font-family:'IBM Plex Mono', monospace; font-size:11px;
    text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft);
    border-bottom:1px solid var(--line); padding:8px 10px;
  }
  .data-table td{ padding:9px 10px; border-bottom:1px solid var(--line); }
  .data-table tr:hover td{ background:var(--primary-soft); }

  .tabs{ display:flex; gap:6px; border-bottom:1px solid var(--line); margin-bottom:20px; }
  .tab{
    padding:10px 16px; font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer;
    border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .tab.active{ color:var(--primary); border-bottom-color:var(--primary); }

  .stat-card{
    background:var(--surface); border:1px solid var(--line); border-radius:12px;
    padding:16px 18px; text-align:center;
  }
  .stat-card .num{ font-family:'Fraunces',serif; font-size:30px; color:var(--primary); font-weight:700; }
  .stat-card .label{ font-size:12px; color:var(--ink-soft); margin-top:4px; }

  .pill{
    display:inline-block; font-size:11px; font-weight:700; border-radius:20px;
    padding:3px 10px; font-family:'IBM Plex Mono', monospace; letter-spacing:0.03em;
  }
  .pill-low{ background:var(--sage-soft); color:var(--sage); }
  .pill-mid{ background:var(--amber-soft); color:var(--amber); }
  .pill-high{ background:var(--rose-soft); color:var(--rose); }
  .pill-synced{ background:var(--sage-soft); color:var(--sage); }
  .pill-pending{ background:var(--amber-soft); color:var(--amber); }
  .pill-conflict{ background:var(--rose-soft); color:var(--rose); }
  .pill-admin{ background:var(--rose-soft); color:var(--rose); }
  .pill-administration{ background:var(--primary-soft); color:var(--primary); }
  .pill-patient{ background:var(--accent-soft); color:var(--amber); }

  /* ---------- Phone-frame app (administration / patient dashboard) ---------- */
  .app-layout{
    display:grid; grid-template-columns: minmax(280px,1fr) 400px; gap:32px;
    max-width:1100px; margin:0 auto; padding:32px 24px 64px;
  }
  @media (max-width: 880px){ .app-layout{ grid-template-columns: 1fr; } }
  .phone-shell{
    background:var(--surface); border:1px solid var(--line); border-radius:28px;
    box-shadow:var(--shadow); overflow:hidden; display:flex; flex-direction:column; height:720px;
  }
  .connectivity-strip{
    height:36px; display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; font-family:'IBM Plex Mono', monospace; font-size:11px;
    letter-spacing:0.06em; color:#fff; cursor:pointer; user-select:none;
    transition:background 0.3s ease;
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.08) 0 6px, transparent 6px 12px);
  }
  .connectivity-strip.online{ background-color:var(--primary); }
  .connectivity-strip.offline{ background-color:var(--rose); }
  .conn-dot{
    width:8px; height:8px; border-radius:50%; background:#fff; display:inline-block; margin-right:8px;
    animation: pulse 1.6s infinite ease-in-out;
  }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.35; } }
  .phone-header{
    padding:14px 18px 10px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .phone-body{ flex:1; overflow-y:auto; padding:16px 18px 8px; }
  .phone-nav{ display:flex; border-top:1px solid var(--line); background:var(--surface); }
  .phone-nav button{
    flex:1; border:none; background:none; padding:12px 4px 10px; cursor:pointer;
    font-family:'Source Sans 3', sans-serif; font-size:11px; color:var(--ink-soft);
    border-top:2px solid transparent;
  }
  .phone-nav button.active{ color:var(--primary); border-top-color:var(--primary); font-weight:600; }

  .screen-title{ font-size:18px; color:var(--primary); margin-bottom:4px; }
  .screen-sub{ font-size:13px; color:var(--ink-soft); margin-bottom:16px; }
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:12px;
    padding:14px 16px; margin-bottom:12px;
  }
  .row{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .bar-track{ height:8px; border-radius:5px; background:var(--line); overflow:hidden; }
  .bar-fill{ height:100%; border-radius:5px; transition:width 0.5s ease; }
  .empty{ text-align:center; color:var(--ink-soft); font-size:13px; padding:24px 10px; }
  .icon-btn{
    width:26px; height:26px; border-radius:50%; border:1px solid var(--line);
    background:#fff; color:var(--rose); font-size:15px; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-family:inherit; padding:0;
  }
  .icon-btn:hover{ background:var(--rose-soft); border-color:var(--rose); }
  .toast{
    position:absolute; left:18px; right:18px; bottom:74px; background:var(--ink); color:#fff;
    border-radius:10px; padding:10px 14px; font-size:13px; box-shadow:var(--shadow);
    animation: fadeUp 0.25s ease; z-index:5;
  }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }

  .footer-note{ margin-top:24px; font-size:12px; color:var(--ink-soft); line-height:1.6; }
</style>
</head>

const API_BASE = window.ASAF_API_BASE || "http://127.0.0.1:8000";

// =====================================================================
// Constants
// =====================================================================
const RISK_LABELS = ["high risk", "low risk", "mid risk"];

const RISK_INFO = {
  "low risk": { pill: "pill-low", bar: "var(--sage)", recommendation: "Routine follow-up at the next scheduled antenatal visit." },
  "mid risk": { pill: "pill-mid", bar: "var(--amber)", recommendation: "Increase monitoring frequency \u2014 recheck vitals within one week." },
  "high risk": { pill: "pill-high", bar: "var(--rose)", recommendation: "Immediate referral to an RHC/THQ hospital for specialist evaluation." },
};

const FEATURE_ORDER = ["Age", "SystolicBP", "DiastolicBP", "BS", "BodyTemp", "HeartRate"];
const FEATURE_LABELS = {
  Age: "Age (years)", SystolicBP: "Systolic BP (mmHg)", DiastolicBP: "Diastolic BP (mmHg)",
  BS: "Blood sugar (mmol/L)", BodyTemp: "Body temperature (\u00b0F)", HeartRate: "Heart rate (bpm)",
};
const DEFAULT_VITALS = { Age: 27, SystolicBP: 110, DiastolicBP: 75, BS: 7.5, BodyTemp: 98.4, HeartRate: 76 };

// Mean values for the "low risk" class & feature importances (for on-device explanation)
const LOW_RISK_MEANS = { Age: 26.87, SystolicBP: 105.87, DiastolicBP: 72.53, BS: 7.22, BodyTemp: 98.37, HeartRate: 72.77 };
const FEATURE_RANGE = { Age: [10, 70], SystolicBP: [70, 160], DiastolicBP: [49, 100], BS: [6, 19], BodyTemp: [98, 103], HeartRate: [7, 90] };
const FEATURE_IMPORTANCE = { BS: 0.3516, SystolicBP: 0.1926, Age: 0.1589, DiastolicBP: 0.1270, HeartRate: 0.1030, BodyTemp: 0.0669 };

const HEALTH_TIPS = {
  1: "First trimester: take your folic acid tablet every day, avoid heavy lifting, and tell your LHW right away about severe nausea or any bleeding.",
  2: "Second trimester: attend your scheduled check-up so your blood pressure and weight can be monitored, and eat more iron-rich foods such as lentils and leafy greens.",
  3: "Third trimester: rest often, count your baby's movements every day, and plan how you will reach the health facility before your due date.",
};

// =====================================================================
// Helpers
// =====================================================================
function runOnDeviceModel(values) {
  const input = FEATURE_ORDER.map((k) => Number(values[k]));
  const probs = dtScore(input); // [high, low, mid]
  let maxIdx = 0;
  for (let i = 1; i < probs.length; i++) if (probs[i] > probs[maxIdx]) maxIdx = i;
  const label = RISK_LABELS[maxIdx];
  const probMap = { "high risk": probs[0], "low risk": probs[1], "mid risk": probs[2] };

  const factors = FEATURE_ORDER.map((k) => {
    const range = FEATURE_RANGE[k][1] - FEATURE_RANGE[k][0];
    const dev = Math.abs(values[k] - LOW_RISK_MEANS[k]) / range;
    const direction = values[k] > LOW_RISK_MEANS[k] ? "higher" : "lower";
    return { key: k, score: dev * FEATURE_IMPORTANCE[k], value: values[k], mean: LOW_RISK_MEANS[k], direction };
  }).sort((a, b) => b.score - a.score).slice(0, 3);

  return { label, probs: probMap, factors };
}

function calcEDD(lmpDateStr) {
  const lmp = new Date(lmpDateStr + "T00:00:00");
  const edd = new Date(lmp);
  edd.setDate(edd.getDate() + 280);
  const today = new Date();
  const gestDays = Math.floor((today - lmp) / (1000 * 60 * 60 * 24));
  const gestWeeks = Math.max(0, Math.floor(gestDays / 7));
  let trimester = 1;
  if (gestWeeks >= 28) trimester = 3;
  else if (gestWeeks >= 14) trimester = 2;
  return { edd, gestWeeks, trimester };
}

function fmtDate(d) {
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}
function fmtDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" }) + " " +
         d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
}
function fmtTime(d) {
  return d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}
function uid(prefix) {
  return prefix + "-" + Math.random().toString(36).slice(2, 8);
}

// =====================================================================
// API client
// =====================================================================
const Api = {
  token: null,

  setToken(t) {
    this.token = t;
    if (t) localStorage.setItem("asaf_token", t);
    else localStorage.removeItem("asaf_token");
  },

  loadToken() {
    this.token = localStorage.getItem("asaf_token");
    return this.token;
  },

  async request(path, { method = "GET", body, form } = {}) {
    const headers = {};
    if (this.token) headers["Authorization"] = "Bearer " + this.token;

    let payload;
    if (form) {
      headers["Content-Type"] = "application/x-www-form-urlencoded";
      payload = new URLSearchParams(form).toString();
    } else if (body !== undefined) {
      headers["Content-Type"] = "application/json";
      payload = JSON.stringify(body);
    }

    const res = await fetch(API_BASE + path, { method, headers, body: payload });
    if (!res.ok) {
      let detail = res.statusText;
      try {
        const j = await res.json();
        detail = j.detail || JSON.stringify(j);
      } catch (e) {}
      throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
    }
    if (res.status === 204) return null;
    return res.json();
  },

  health() { return this.request("/api/health"); },
  login(username, password) { return this.request("/api/login", { method: "POST", form: { username, password } }); },
  register(data) { return this.request("/api/register", { method: "POST", body: data }); },
  me() { return this.request("/api/me"); },
  updateMe(data) { return this.request("/api/me", { method: "PATCH", body: data }); },

  patients() { return this.request("/api/patients"); },
  createPatient(data) { return this.request("/api/patients", { method: "POST", body: data }); },
  updatePatient(id, data) { return this.request("/api/patients/" + id, { method: "PATCH", body: data }); },
  deletePatient(id) { return this.request("/api/patients/" + id, { method: "DELETE" }); },
  patientExams(id) { return this.request("/api/patients/" + id + "/examinations"); },

  myPatient() { return this.request("/api/patients/me"); },
  updateMyPatient(data) { return this.request("/api/patients/me", { method: "PATCH", body: data }); },
  myExams() { return this.request("/api/patients/me/examinations"); },

  predict(vitals) { return this.request("/api/predict", { method: "POST", body: vitals }); },
  createExam(data) { return this.request("/api/examinations", { method: "POST", body: data }); },
  sync(items) { return this.request("/api/sync", { method: "POST", body: items }); },

  adminUsers() { return this.request("/api/admin/users"); },
  adminCreateUser(data) { return this.request("/api/admin/users", { method: "POST", body: data }); },
  adminDeleteUser(id) { return this.request("/api/admin/users/" + id, { method: "DELETE" }); },
  adminResetPassword(id, new_password) { return this.request("/api/admin/users/" + id + "/reset_password", { method: "POST", body: { new_password } }); },
  adminData() { return this.request("/api/admin/data"); },
  adminLogs() { return this.request("/api/admin/logs?limit=100"); },
  adminSettings() { return this.request("/api/admin/settings"); },
  adminUpdateSettings(settings) { return this.request("/api/admin/settings", { method: "PUT", body: { settings } }); },
};

// =====================================================================
// Hash-based router hook
// =====================================================================
function useHashRoute() {
  const [route, setRoute] = React.useState(window.location.hash.replace("#", "") || "/home");
  React.useEffect(() => {
    const onChange = () => setRoute(window.location.hash.replace("#", "") || "/home");
    window.addEventListener("hashchange", onChange);
    return () => window.removeEventListener("hashchange", onChange);
  }, []);
  return route;
}
function navigate(path) {
  window.location.hash = path;
}

function RegisterPage({ onAuth }) {
  const [role, setRole] = React.useState("administration");

  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");

  async function submit(e) {
    e.preventDefault();
    setError(""); setLoading(true);

function ProfilePage({ user, onUserUpdate }) {

// =====================================================================
// Examination & Risk screen
// =====================================================================
function ExamScreen({ patients, isOnline, defaultModel, onSaveExam }) {
  const [patientId, setPatientId] = React.useState(patients[0] ? patients[0].id : "");
  const [vitals, setVitals] = React.useState(DEFAULT_VITALS);
  const [result, setResult] = React.useState(null);
  const [modelUsed, setModelUsed] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [error, setError] = React.useState("");

  React.useEffect(() => {
    const p = patients.find((x) => x.id === patientId);
    if (p) {
      setVitals((v) => ({ ...v, Age: p.age }));
    } else if (patients.length > 0) {
      setPatientId(patients[0].id);
    }
  }, [patientId, patients]);

  function update(key, val) {
    setVitals((v) => ({ ...v, [key]: val }));
    setResult(null);
  }

  async function runAssessment() {
    setError(""); setResult(null); setBusy(true);
    try {
      if (isOnline && defaultModel === "server") {
        const r = await Api.predict(vitals);
        setResult(r);
        setModelUsed("server");
      } else {
        const r = runOnDeviceModel(vitals);
        setResult(r);
        setModelUsed("on-device");
      }
    } catch (err) {
      setError(err.message || "Risk check failed");
    } finally {
      setBusy(false);
    }
  }

  function save() {
    if (!result) return;
    const patient = patients.find((x) => x.id === patientId);
    onSaveExam(patient, vitals, result, modelUsed);
    setResult(null);
  }

  const patient = patients.find((x) => x.id === patientId);

  return (
    <div className="phone-body">
      <div className="screen-title">Trimester examination</div>
      <div className="screen-sub">
        {isOnline && defaultModel === "server"
          ? "Server-side Random Forest model · 86.2% test accuracy"
          : "On-device decision tree model · 83.7% test accuracy"}
      </div>

      <div className="field">
        <label>Patient</label>
        <select value={patientId} onChange={(e) => { setPatientId(Number(e.target.value)); setResult(null); }}>
          {patients.map((p) => <option key={p.id} value={p.id}>{p.name} (P-{p.id})</option>)}
        </select>
      </div>

      <div className="card">
        <div className="grid-2">
          {FEATURE_ORDER.map((k) => (
            <div className="field" key={k}>
              <label>{FEATURE_LABELS[k]}</label>
              <input type="number" step="0.1" value={vitals[k]} onChange={(e) => update(k, Number(e.target.value))} />
            </div>
          ))}
        </div>
        <button className="btn btn-accent btn-block" onClick={runAssessment} disabled={busy || !patient}>
          {busy ? "Running\u2026" : "Run risk assessment"}
        </button>
        {error && <div className="error-box" style={{ marginTop: "10px" }}>{error}</div>}
      </div>

      {result && (
        <div className="card">
          <div className="row">
            <strong style={{ fontSize: "13px" }}>Predicted risk</strong>
            <span className={"pill " + RISK_INFO[result.label].pill}>{result.label}</span>
          </div>
          <div style={{ fontSize: "11px", color: "var(--ink-soft)", marginTop: "4px" }}>
            Model: {modelUsed === "server" ? "server-side Random Forest" : "on-device decision tree"}
          </div>

          <div style={{ marginTop: "10px" }}>
            {RISK_LABELS.map((label) => (
              <div key={label} style={{ marginBottom: "6px" }}>
                <div className="row" style={{ fontSize: "11px", color: "var(--ink-soft)", marginBottom: "3px" }}>
                  <span>{label}</span>
                  <span>{(result.probs[label] * 100).toFixed(0)}%</span>
                </div>
                <div className="bar-track">
                  <div className="bar-fill" style={{ width: (result.probs[label] * 100) + "%", background: RISK_INFO[label].bar }}></div>
                </div>
              </div>
            ))}
          </div>

          <div style={{ marginTop: "10px", fontSize: "13px" }}>
            <strong>Recommended action: </strong>{RISK_INFO[result.label].recommendation}
          </div>

          <div style={{ marginTop: "10px", fontSize: "12px", color: "var(--ink-soft)" }}>
            <strong style={{ color: "var(--ink)" }}>Top contributing factors</strong>
            <ul style={{ margin: "6px 0 0 18px", padding: 0 }}>
              {result.factors.map((f) => (
                <li key={f.key}>{FEATURE_LABELS[f.key]}: {f.value} ({f.direction} than the typical low-risk value of {f.mean})</li>
              ))}
            </ul>
          </div>

          <button className="btn btn-primary btn-block" style={{ marginTop: "12px" }} onClick={save}>
            Save examination{patient ? " for " + patient.name : ""}
          </button>
        </div>
      )}
    </div>
  );
}

          Simulate field conflict
        </button>
        <p style={{ fontSize: "11px", color: "var(--ink-soft)", marginTop: "8px" }}>

      </div>

      {queue.length === 0 && <div className="empty">No records queued yet. Go offline and register a patient or save an examination.</div>}

      {queue.map((item) => (
        <div className="card" key={item.client_id}>

              <strong style={{ fontSize: "13px" }}>{item.summary}</strong>

        </div>
      )}
    </div>
  );
}

        <strong style={{ fontSize: "13px" }}>My details</strong>
        <div className="field" style={{ marginTop: "10px" }}>
          <label>Village</label>
          <input value={village} onChange={(e) => setVillage(e.target.value)} />
        </div>
        <button className="btn btn-secondary btn-block" onClick={saveVillage} disabled={saving}>
          {saving ? "Saving\u2026" : "Save"}
        </button>
      </div>
    </div>
  );
}

function AdminPage({ user }) {
  const [tab, setTab] = React.useState("accounts");
  const [users, setUsers] = React.useState([]);
  const [data, setData] = React.useState(null);
  const [logs, setLogs] = React.useState([]);
  const [settings, setSettings] = React.useState({});
  const [error, setError] = React.useState("");
  const [loading, setLoading] = React.useState(true);

  async function loadAll() {
    setLoading(true); setError("");
    try {
      const [u, d, l, s] = await Promise.all([Api.adminUsers(), Api.adminData(), Api.adminLogs(), Api.adminSettings()]);
      setUsers(u); setData(d); setLogs(l); setSettings(s.settings);
    } catch (err) {
      setError(err.message || "Failed to load admin data");
    } finally {
      setLoading(false);
    }
  }

  React.useEffect(() => { loadAll(); }, []);

  if (loading) return <div className="page"><div className="empty">Loading admin dashboard…</div></div>;

  return (
    <div className="page">
      <div className="eyebrow">Admin · system oversight</div>
      <h1 style={{ marginTop: "6px", fontSize: "28px" }}>System administration</h1>
      {error && <div className="error-box" style={{ marginTop: "16px" }}>{error}</div>}

      {data && (
        <div className="grid-3" style={{ marginTop: "20px" }}>
          <div className="stat-card"><div className="num">{data.user_count}</div><div className="label">Accounts</div></div>
          <div className="stat-card"><div className="num">{data.patient_count}</div><div className="label">Patient records</div></div>
          <div className="stat-card"><div className="num">{data.examination_count}</div><div className="label">Examinations logged</div></div>
        </div>
      )}

      <div className="tabs" style={{ marginTop: "28px" }}>
        <div className={"tab " + (tab === "accounts" ? "active" : "")} onClick={() => setTab("accounts")}>Accounts</div>
        <div className={"tab " + (tab === "data" ? "active" : "")} onClick={() => setTab("data")}>All data</div>
        <div className={"tab " + (tab === "system" ? "active" : "")} onClick={() => setTab("system")}>Settings &amp; logs</div>

      {tab === "accounts" && <AccountsTab users={users} currentUser={user} onChange={loadAll} />}
      {tab === "data" && data && <DataTab patients={data.patients} />}
      {tab === "system" && <SystemTab settings={settings} logs={logs} onChange={loadAll} />}
    </div>
  );
}

function AccountsTab({ users, currentUser, onChange }) {
  const [showCreate, setShowCreate] = React.useState(false);
  const [username, setUsername] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [fullName, setFullName] = React.useState("");
  const [role, setRole] = React.useState("administration");
  const [title, setTitle] = React.useState("");
  const [error, setError] = React.useState("");
  const [resetTarget, setResetTarget] = React.useState(null);
  const [resetPassword, setResetPassword] = React.useState("");

  async function createUser(e) {
    e.preventDefault();
    setError("");
    try {
      await Api.adminCreateUser({ username, password, full_name: fullName, role, title, email });
      setShowCreate(false);
      setUsername(""); setEmail(""); setPassword(""); setFullName(""); setTitle("");
      onChange();
    } catch (err) {
      setError(err.message || "Failed to create user");
    }
  }

  async function deleteUser(u) {
    if (!window.confirm("Delete account \"" + u.username + "\"? This also deletes their patient records.")) return;
    try {
      await Api.adminDeleteUser(u.id);
      onChange();
    } catch (err) {
      setError(err.message || "Failed to delete user");
    }
  }

  async function submitReset(e) {
    e.preventDefault();
    try {
      await Api.adminResetPassword(resetTarget.id, resetPassword);
      setResetTarget(null); setResetPassword("");
    } catch (err) {
      setError(err.message || "Failed to reset password");
    }
  }

  return (
    <div>
      {error && <div className="error-box">{error}</div>}
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "12px" }}>

        <form onSubmit={createUser} className="card" style={{ marginBottom: "16px" }}>
          <div className="grid-2">
            <div className="field"><label>Username</label><input value={username} onChange={(e) => setUsername(e.target.value)} required /></div>
            <div className="field"><label>Password</label><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required /></div>
          </div>
          <div className="grid-2">
            <div className="field"><label>Full name</label><input value={fullName} onChange={(e) => setFullName(e.target.value)} required /></div>
            <div className="field">
              <label>Role</label>
              <select value={role} onChange={(e) => setRole(e.target.value)}>
                <option value="administration">Administration (health worker)</option>
                <option value="patient">Patient</option>

          </div>
          <div className="grid-2">
            <div className="field">
              <label>Email{role === "patient" ? "" : " (optional)"}</label>

            </div>
            <div className="field"><label>Title</label><input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="e.g. Medical Officer" /></div>
          </div>
          <button className="btn btn-primary btn-block" type="submit">Create account</button>
        </form>
      )}

      {resetTarget && (
        <form onSubmit={submitReset} className="card" style={{ marginBottom: "16px" }}>
          <strong style={{ fontSize: "13px" }}>Reset password for {resetTarget.username}</strong>
          <div className="field" style={{ marginTop: "10px" }}>
            <input type="password" value={resetPassword} onChange={(e) => setResetPassword(e.target.value)} placeholder="New password" required />
          </div>
          <div style={{ display: "flex", gap: "8px" }}>
            <button className="btn btn-primary" type="submit">Set password</button>
            <button className="btn btn-secondary" type="button" onClick={() => setResetTarget(null)}>Cancel</button>
          </div>
        </form>
      )}

      <table className="data-table">
        <thead>
          <tr><th>Username</th><th>Email</th><th>Full name</th><th>Role</th><th>Title</th><th>Patients</th><th>Created</th><th></th></tr>
        </thead>
        <tbody>
          {users.map((u) => (
            <tr key={u.id}>
              <td className="mono">{u.username}</td>
              <td className="mono">{u.email || "\u2014"}</td>
              <td>{u.full_name}</td>
              <td><span className={"pill pill-" + u.role}>{u.role}</span></td>
              <td>{u.title}</td>
              <td>{u.patient_count}</td>
              <td>{fmtDateTime(u.created_at)}</td>
              <td style={{ whiteSpace: "nowrap" }}>
                <button className="btn btn-secondary btn-sm" onClick={() => setResetTarget(u)} style={{ marginRight: "6px" }}>Reset PW</button>

          ))}

  );

// =====================================================================
// App dashboard (the phone-frame field app: patient management, AI risk
// checks, and offline sync for administration accounts; companion view
// for patient accounts)
// =====================================================================
function AppDashboard({ user, prefs }) {
  const isAdministration = user.role === "administration" || user.role === "admin";

  const [patients, setPatients] = React.useState([]);
  const [myPatient, setMyPatient] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState("");

  const [isOnline, setIsOnline] = React.useState(!prefs.startOffline);
  const [screen, setScreen] = React.useState(isAdministration ? "patients" : "companion");
  const [queue, setQueue] = React.useState([]);
  const [log, setLog] = React.useState([]);
  const [toast, setToast] = React.useState("");

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(""), 2800);
  }

  async function refresh() {
    try {
      if (isAdministration) {
        setPatients(await Api.patients());
      } else {
        setMyPatient(await Api.myPatient());
      }
    } catch (err) {
      setError(err.message || "Failed to load data");
    }
  }

  React.useEffect(() => {
    refresh().finally(() => setLoading(false));
  }, []);

  // --- Patients (administration) ---
  async function onAddPatient(data) {
    if (isOnline) {
      try {
        await Api.createPatient(data);
        await refresh();
        showToast("Patient registered.");
      } catch (err) {
        showToast("Error: " + err.message);
      }
    } else {
      const client_id = uid("q");
      setQueue((q) => [...q, {
        client_id, type: "patient_create", payload: data,
        client_ts: new Date(), status: "pending",
        summary: "New patient registration", patientName: data.name,
      }]);
      setPatients((p) => [...p, {
        id: "pending-" + client_id, name: data.name, age: data.age, lmp: data.lmp,
        village: data.village, sync_status: "pending",
        updated_at: new Date().toISOString(), created_at: new Date().toISOString(),
      }]);
      showToast("Saved offline — will sync when back online.");
    }
  }

  async function onDeletePatient(p) {
    if (typeof p.id === "string") {
      // a still-pending offline record
      setPatients((list) => list.filter((x) => x.id !== p.id));
      setQueue((q) => q.filter((item) => !(item.type === "patient_create" && item.payload.name === p.name)));
      return;
    }
    if (!isOnline) {
      showToast("Connect to the network to remove a saved patient.");
      return;
    }
    if (!window.confirm("Remove " + p.name + "?")) return;
    try {
      await Api.deletePatient(p.id);
      await refresh();
    } catch (err) {
      showToast("Error: " + err.message);
    }
  }

  // --- Examinations (administration) ---
  async function onSaveExam(patient, vitals, result, modelUsed) {
    if (!patient) return;
    if (isOnline && typeof patient.id === "number") {
      try {
        await Api.createExam({
          patient_id: patient.id, vitals,
          model_used: modelUsed, risk_label: result.label, probs: result.probs,
        });
        showToast("Examination saved for " + patient.name + " (" + result.label + ").");
      } catch (err) {
        showToast("Error: " + err.message);
      }
    } else {
      const client_id = uid("q");
      setQueue((q) => [...q, {
        client_id, type: "examination_create",
        payload: { patient_id: patient.id, vitals, risk_label: result.label, probs: result.probs, model_used: modelUsed },
        client_ts: new Date(), status: "pending",
        summary: "Examination result: " + result.label, patientName: patient.name,
      }]);
      showToast("Examination saved offline — will sync when back online.");
    }
  }

  // --- Sync ---
  async function onSyncNow() {
    const pending = queue.filter((q) => q.status === "pending");
    if (pending.length === 0) return;
    try {
      const resp = await Api.sync(pending.map((p) => ({
        client_id: p.client_id, type: p.type, payload: p.payload, client_ts: p.client_ts.toISOString(),
      })));
      const byId = {};
      resp.results.forEach((r) => { byId[r.client_id] = r; });
      setQueue((q) => q.map((item) => byId[item.client_id] ? { ...item, status: byId[item.client_id].status } : item));
      setLog((l) => [
        ...resp.results.map((r) => "[" + new Date().toLocaleTimeString() + "] " + r.client_id + ": " + r.detail),
        ...l,
      ]);
      await refresh();
      const synced = resp.results.filter((r) => r.status === "synced").length;
      const conflicts = resp.results.filter((r) => r.status === "conflict").length;
      showToast("Synced " + synced + " record(s)" + (conflicts ? ", " + conflicts + " conflict(s) flagged." : "."));
    } catch (err) {
      showToast("Sync error: " + err.message);
    }
  }

  async function onSimulateConflict() {
    const target = patients.find((p) => typeof p.id === "number");
    if (!target) { showToast("No synced patient to use for this demo."); return; }
    try {
      // 1. Simulate "another device already synced" by updating the server now.
      await Api.updatePatient(target.id, { village: (target.village || "Village") + " (district office)" });
      await refresh();
      // 2. Queue an offline edit timestamped 10 minutes ago for the same record.
      const oldTs = new Date(Date.now() - 10 * 60 * 1000);
      setQueue((q) => [...q, {
        client_id: uid("q"), type: "patient_update",
        payload: { patient_id: target.id, village: (target.village || "Village") + " (field note)" },
        client_ts: oldTs, status: "pending",
        summary: "Edit village name (offline, 10 min ago)", patientName: target.name,
      }]);
      showToast("Conflict scenario ready for " + target.name + " — press Sync now.");
    } catch (err) {
      showToast("Error: " + err.message);
    }
  }

  // --- Companion (patient) ---
  async function onCompanionUpdate(data) {
    const updated = await Api.updateMyPatient(data);
    setMyPatient(updated);
    showToast("Saved.");
  }

  function toggleOnline() {
    setIsOnline((v) => {
      if (!v) showToast("Back online — use Sync now to upload queued records.");
      return !v;
    });
  }

  if (loading) return <div className="page"><div className="empty">Loading your dashboard…</div></div>;
  if (error) return <div className="page"><div className="error-box">{error}</div></div>;

  const navItems = isAdministration
    ? [["patients", "Patients"], ["exam", "Risk check"], ["sync", "Sync"]]
    : [["companion", "Companion"]];

  return (
    <div className="app-layout">
      <div>
        <div className="eyebrow">{user.role === "admin" ? "Admin (field-app view)" : (isAdministration ? "Administration" : "Patient")}</div>
        <h1 style={{ marginTop: "6px", fontSize: "28px" }}>Hello, {user.full_name.split(" ")[0]}</h1>
        <p className="lede" style={{ marginTop: "10px" }}>
          {isAdministration
            ? "This is the field-worker app: manage your own patients, run AI risk checks, and review the offline sync queue. Your patient list is private to your account — other health workers can't see it, but the admin account can."
            : "This is your companion app: pregnancy timeline, health tips for your current trimester, and reminders from your health worker."}
        </p>
        <div className="card" style={{ marginTop: "24px" }}>
          <strong style={{ fontSize: "13px" }}>{user.title}</strong>
          <div style={{ fontSize: "12px", color: "var(--ink-soft)", marginTop: "4px" }}>
            Username: <span className="mono">{user.username}</span> · Role: <span className={"pill pill-" + user.role}>{user.role}</span>
          </div>
        </div>
        {isAdministration && (
          <div className="footer-note">
            Risk model in use: {isOnline && prefs.defaultModel === "server" ? "server-side Random Forest" : "on-device decision tree"}.
            Change this in <a href="#/settings">Settings</a>.
          </div>
        )}
      </div>

      <div className="phone-shell" style={{ position: "relative" }}>
        <ConnectivityStrip isOnline={isOnline} pendingCount={queue.filter((q) => q.status === "pending").length} onToggle={toggleOnline} />
        <div className="phone-header">
          <strong style={{ fontSize: "13px" }}>ASAF Field App</strong>
          <span className="mono" style={{ fontSize: "11px", color: "var(--ink-soft)" }}>{user.username}</span>
        </div>

        {screen === "patients" && <PatientsScreen patients={patients} onAddPatient={onAddPatient} onDeletePatient={onDeletePatient} />}
        {screen === "exam" && <ExamScreen patients={patients.filter((p) => typeof p.id === "number")} isOnline={isOnline} defaultModel={prefs.defaultModel} onSaveExam={onSaveExam} />}
        {screen === "sync" && <SyncScreen queue={queue} log={log} isOnline={isOnline} onSyncNow={onSyncNow} onSimulateConflict={onSimulateConflict} patients={patients} />}
        {screen === "companion" && myPatient && <CompanionScreen patient={myPatient} smsReminders={prefs.smsReminders} onUpdate={onCompanionUpdate} />}

        <Toast message={toast} />

        <div className="phone-nav">
          {navItems.map(([key, label]) => (
            <button key={key} className={screen === key ? "active" : ""} onClick={() => setScreen(key)}>{label}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// =====================================================================
// Root App
// =====================================================================
function App() {
  const route = useHashRoute();
  const [user, setUser] = React.useState(null);
  const [booting, setBooting] = React.useState(true);
  const [prefs, setPrefs] = React.useState({ startOffline: false, defaultModel: "server", smsReminders: false });

  React.useEffect(() => {
    const token = Api.loadToken();
    if (!token) { setBooting(false); return; }
    Api.me().then(setUser).catch(() => Api.setToken(null)).finally(() => setBooting(false));
  }, []);

  function onLogout() {
    Api.setToken(null);
    setUser(null);
    navigate("/home");
  }

  // route guards
  React.useEffect(() => {
    if (booting) return;
    const authedOnly = ["/profile", "/settings", "/app", "/admin"];
    if (authedOnly.includes(route) && !user) navigate("/login");
    if (route === "/admin" && user && user.role !== "admin") navigate("/app");
    if ((route === "/login" || route === "/register") && user) navigate(user.role === "admin" ? "/admin" : "/app");
  }, [route, user, booting]);

  if (booting) return <div className="page"><div className="empty">Loading ASAF…</div></div>;

  let content;
  switch (route) {
    case "/home": content = <HomePage user={user} />; break;
    case "/about": content = <AboutPage />; break;
    case "/login": content = <LoginPage onAuth={setUser} />; break;
    case "/register": content = <RegisterPage onAuth={setUser} />; break;
    case "/profile": content = user ? <ProfilePage user={user} onUserUpdate={setUser} /> : null; break;
    case "/settings": content = user ? <SettingsPage user={user} prefs={prefs} onPrefsChange={setPrefs} /> : null; break;
    case "/app": content = user ? <AppDashboard user={user} prefs={prefs} /> : null; break;
    case "/admin": content = user && user.role === "admin" ? <AdminPage user={user} /> : null; break;
    default: content = <HomePage user={user} />;
  }

  return (
    <React.Fragment>
      <Navbar user={user} route={route} onLogout={onLogout} />
      {content}
    </React.Fragment>
  );
}
